name: Build VSCode Extension (VSIX)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vsix:
    name: Package VSIX with binaries
    needs: []  # runs independently; downloads from same release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Extension dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npx tsc -p ./

      # Download platform binaries from the same release
      - name: Download Windows binary
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          fileName: "diffinite-win-x64.zip"
          out-file-path: "vscode-extension/tmp"
        continue-on-error: true

      - name: Download Linux binary
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          fileName: "diffinite-linux-x64.tar.gz"
          out-file-path: "vscode-extension/tmp"
        continue-on-error: true

      - name: Download macOS binary
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name || github.ref_name }}
          fileName: "diffinite-darwin-x64.tar.gz"
          out-file-path: "vscode-extension/tmp"
        continue-on-error: true

      - name: Extract and place binaries
        working-directory: vscode-extension
        run: |
          mkdir -p bin/win-x64 bin/linux-x64 bin/darwin-x64

          if [ -f tmp/diffinite-win-x64.zip ]; then
            unzip tmp/diffinite-win-x64.zip -d bin/win-x64/
            echo "✓ Windows binary placed"
          fi

          if [ -f tmp/diffinite-linux-x64.tar.gz ]; then
            tar -xzf tmp/diffinite-linux-x64.tar.gz -C bin/linux-x64/
            chmod +x bin/linux-x64/diffinite
            echo "✓ Linux binary placed"
          fi

          if [ -f tmp/diffinite-darwin-x64.tar.gz ]; then
            tar -xzf tmp/diffinite-darwin-x64.tar.gz -C bin/darwin-x64/
            chmod +x bin/darwin-x64/diffinite
            echo "✓ macOS binary placed"
          fi

          rm -rf tmp

      - name: Record build metadata
        working-directory: vscode-extension
        run: |
          echo '{
            "commit": "${{ github.sha }}",
            "tag": "${{ github.event.release.tag_name || github.ref_name }}",
            "built_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' > bin/build-info.json
          cat bin/build-info.json

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: vscode-extension
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-extension/*.vsix

      - name: Upload VSIX to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/*.vsix

      - name: Publish to VSCode Marketplace
        if: github.event_name == 'release'
        working-directory: vscode-extension
        run: vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
