name: Release Pipeline

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Build standalone binaries (3 platforms)
  # Gate: if this fails, nothing else runs.
  # ─────────────────────────────────────────────
  build-binaries:
    name: Build Binary (${{ matrix.os }})
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            ext: .exe
            archive: zip
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            platform: darwin-x64
            ext: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo pkg-config

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller diffinite.spec

      - name: Verify binary runs
        shell: bash
        run: ./dist/diffinite${{ matrix.ext }} --help
        env:
          PYTHONIOENCODING: utf-8

      - name: Compute SHA-256
        shell: bash
        run: |
          cd dist
          sha256sum diffinite${{ matrix.ext }} > diffinite${{ matrix.ext }}.sha256
          cat diffinite${{ matrix.ext }}.sha256

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd dist
          7z a ../diffinite-${{ matrix.platform }}.zip diffinite${{ matrix.ext }} diffinite${{ matrix.ext }}.sha256

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf ../diffinite-${{ matrix.platform }}.tar.gz diffinite${{ matrix.ext }} diffinite${{ matrix.ext }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: diffinite-${{ matrix.platform }}.*

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            diffinite-${{ matrix.platform }}.*

  # ─────────────────────────────────────────────
  # Stage 2: Build & publish VSCode extension
  # Runs only after ALL binary builds succeed.
  # ─────────────────────────────────────────────
  publish-vsce:
    name: Publish VSCode Extension
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Extension dependencies
        working-directory: vscode-extension
        run: npm install

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npx tsc -p ./

      # Download platform binaries from build-binaries job
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-win-x64
          path: vscode-extension/tmp
        continue-on-error: true

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x64
          path: vscode-extension/tmp
        continue-on-error: true

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-darwin-x64
          path: vscode-extension/tmp
        continue-on-error: true

      - name: Extract and place binaries
        working-directory: vscode-extension
        run: |
          mkdir -p bin/win-x64 bin/linux-x64 bin/darwin-x64

          if [ -f tmp/diffinite-win-x64.zip ]; then
            unzip tmp/diffinite-win-x64.zip -d bin/win-x64/
            echo "✓ Windows binary placed"
          fi

          if [ -f tmp/diffinite-linux-x64.tar.gz ]; then
            tar -xzf tmp/diffinite-linux-x64.tar.gz -C bin/linux-x64/
            chmod +x bin/linux-x64/diffinite
            echo "✓ Linux binary placed"
          fi

          if [ -f tmp/diffinite-darwin-x64.tar.gz ]; then
            tar -xzf tmp/diffinite-darwin-x64.tar.gz -C bin/darwin-x64/
            chmod +x bin/darwin-x64/diffinite
            echo "✓ macOS binary placed"
          fi

          rm -rf tmp

      - name: Record build metadata
        working-directory: vscode-extension
        run: |
          echo '{
            "commit": "${{ github.sha }}",
            "tag": "${{ github.event.release.tag_name || github.ref_name }}",
            "built_at": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' > bin/build-info.json
          cat bin/build-info.json

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: vscode-extension
        run: vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-extension/*.vsix

      - name: Upload VSIX to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-extension/*.vsix

      - name: Publish to VSCode Marketplace
        if: github.event_name == 'release'
        working-directory: vscode-extension
        run: vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}

  # ─────────────────────────────────────────────
  # Stage 3: Publish to PyPI
  # Runs only after VSCE succeeds (which requires binaries).
  # ─────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: publish-vsce
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/diffinite
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
