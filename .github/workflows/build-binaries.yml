name: Build Standalone Binaries

on:
  release:
    types: [published]
  workflow_dispatch:  # manual trigger for testing

permissions:
  contents: write  # needed to upload release assets

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win-x64
            ext: .exe
            archive: zip
          - os: ubuntu-latest
            platform: linux-x64
            ext: ""
            archive: tar.gz
          - os: macos-latest
            platform: darwin-x64
            ext: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller diffinite.spec

      - name: Verify binary runs
        run: ./dist/diffinite${{ matrix.ext }} --help

      - name: Compute SHA-256
        shell: bash
        run: |
          cd dist
          sha256sum diffinite${{ matrix.ext }} > diffinite${{ matrix.ext }}.sha256
          cat diffinite${{ matrix.ext }}.sha256
          echo "BINARY_HASH=$(cat diffinite${{ matrix.ext }}.sha256 | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd dist
          7z a ../diffinite-${{ matrix.platform }}.zip diffinite${{ matrix.ext }} diffinite${{ matrix.ext }}.sha256

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd dist
          tar -czf ../diffinite-${{ matrix.platform }}.tar.gz diffinite${{ matrix.ext }} diffinite${{ matrix.ext }}.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: diffinite-${{ matrix.platform }}.*

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            diffinite-${{ matrix.platform }}.*
