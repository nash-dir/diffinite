name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run pytest
      run: |
        python -m pytest -v

  test-vscode-bundle:
    name: Test VSCode Bundle (CD)
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Extension dependencies
      working-directory: vscode-extension
      run: npm install

    - name: Compile TypeScript
      working-directory: vscode-extension
      run: npx tsc -p ./

    - name: Test Bundle Generation & Smoke Test
      shell: pwsh
      run: |
        ./vscode-extension/scripts/build_bundle.ps1 -pythonVersion "3.12.9"

    - name: Test VSIX Packaging (Dry-Run)
      working-directory: vscode-extension
      run: |
        npm install -g @vscode/vsce@3.2.2
        # --dry-run purely tests that the bundle is packable without errors
        # Note: --no-dependencies because we rely on embedded python
        vsce package --dry-run --target win32-x64 --no-dependencies --allow-star-activation
